name: Marketplace Browser Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target base URL to test'
        required: true
        default: 'https://harbourview-platform.vercel.app'
      allow_production_writes:
        description: 'Type ALLOW_PRODUCTION_SMOKE_WRITES to permit production smoke writes'
        required: true
        default: 'NO'
  push:
    branches:
      - 'smoke/marketplace-browser-*'

permissions:
  contents: write

concurrency:
  group: marketplace-browser-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Browser-submit marketplace capture and verify Supabase rows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip smoke]') }}
    env:
      IS_CONTROLLED_SMOKE_BRANCH: ${{ startsWith(github.ref_name, 'smoke/marketplace-browser-') }}
      IS_CONFIRMED_MANUAL_DISPATCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.allow_production_writes == 'ALLOW_PRODUCTION_SMOKE_WRITES' }}
      RESOLVED_SMOKE_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_url || 'https://harbourview-platform.vercel.app' }}
    steps:
      - name: Validate production write confirmation
        run: |
          if [ "${IS_CONTROLLED_SMOKE_BRANCH}" = "true" ] || [ "${IS_CONFIRMED_MANUAL_DISPATCH}" = "true" ]; then
            echo "Marketplace browser smoke write gate accepted."
          else
            echo "Refusing to run production browser smoke writes without exact manual confirmation or controlled smoke branch."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Install Playwright for smoke runner
        run: npm install --no-save playwright@1.56.1

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run marketplace browser smoke and write result artifact
        id: smoke_result
        continue-on-error: true
        env:
          HARBOURVIEW_SMOKE_BASE_URL: ${{ env.RESOLVED_SMOKE_BASE_URL }}
          HARBOURVIEW_SMOKE_WRITE: '1'
          HARBOURVIEW_SMOKE_CLEANUP: '1'
          HARBOURVIEW_ALLOW_PRODUCTION_SMOKE_WRITES: '1'
        run: |
          set +e
          npm run smoke:marketplace:browser > marketplace-browser-smoke.log 2>&1
          code=$?
          status="failed"
          if [ "$code" -eq 0 ]; then
            status="passed"
          fi
          mkdir -p smoke-results
          log_b64=$(base64 -w 0 marketplace-browser-smoke.log)
          cat > smoke-results/marketplace-browser-smoke-latest.json <<EOF
          {
            "status": "${status}",
            "exit_code": ${code},
            "workflow_run_id": "${GITHUB_RUN_ID}",
            "workflow_run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "branch": "${GITHUB_REF_NAME}",
            "commit": "${GITHUB_SHA}",
            "base_url": "${RESOLVED_SMOKE_BASE_URL}",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "expected_inquiry_types": [
              "quote_routing",
              "listing_submission",
              "wanted_request_submission"
            ],
            "expected_cleanup_status": "closed",
            "log_base64": "${log_b64}"
          }
          EOF
          cat marketplace-browser-smoke.log
          exit $code

      - name: Commit smoke result artifact to trigger branch
        if: ${{ always() && startsWith(github.ref_name, 'smoke/marketplace-browser-') }}
        run: |
          git config user.name "harbourview-smoke-bot"
          git config user.email "harbourviewcompany@gmail.com"
          git add smoke-results/marketplace-browser-smoke-latest.json
          git commit -m "Record marketplace browser smoke result [skip smoke]" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Fail workflow if smoke failed
        if: ${{ steps.smoke_result.outcome != 'success' }}
        run: exit 1
